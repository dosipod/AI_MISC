[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
    https://github.com

; Build flags to enable OTA support natively
build_flags =
    -D CORE_DEBUG_LEVEL=0

; Configuration for subsequent OTA deployments from Codespaces
; Uncomment these lines ONLY after your initial USB flash is complete
; upload_protocol = espota
; upload_port = hw724_wled_receiver.local
