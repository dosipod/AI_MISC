[env:esp32dev]
platform = espressif32@6.5.0  ; Lock platform version to preserve core internal DAC drivers
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    schreibfaul1/ESP32-audioI2S @ 2.0.7
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
